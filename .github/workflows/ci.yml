name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build fibrae
        run: bun --filter fibrae build

      - name: Typecheck fibrae
        run: bun --filter fibrae types:check

      - name: Lint
        run: bunx oxlint packages/fibrae/src/

      - name: Bundle size check
        run: bunx size-limit

  test:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build fibrae
        run: bun --filter fibrae build

      - name: Start servers
        run: |
          cd packages/demo
          bun server/index.ts &
          bun run dev:server &

      - name: Run Cypress
        uses: cypress-io/github-action@v6
        with:
          working-directory: packages/demo
          install: false
          wait-on: "http://localhost:5173, http://localhost:3001/ssr/router"
          wait-on-timeout: 60

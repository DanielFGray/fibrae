name: Bundle Size

on:
  pull_request:
    branches: [main, develop]

permissions:
  pull-requests: write

jobs:
  size:
    name: Report Bundle Size
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build fibrae
        run: bun --filter fibrae build

      - uses: andresz1/size-limit-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          package_manager: bun
          build_script: ""
          skip_step: build
